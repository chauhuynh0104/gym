<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xóa dấu +</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
}
h2{
    text-align:center;
}
textarea{
    width:100%;
    height:150px;
    margin-top:10px;
    padding:10px;
    font-size:15px;
    border:1px solid #ccc;
    border-radius:6px;
    resize:vertical;
}
button{
    margin-top:10px;
    padding:8px 16px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    font-size:14px;
    cursor:pointer;
}
button:hover{
    background:#45a049;
}
</style>
</head>

<body>

<div class="container">
<label>Input</label>
<textarea id="input"></textarea>

<label>Output</label>
<textarea id="output"></textarea>

<button onclick="copyText()">Sao chép</button>
</div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");

input.addEventListener("input", () => {
    output.value = input.value.replace(/\+\s*/g, "");
});

function copyText(){
    output.select();
    document.execCommand("copy");
}
</script>

</body>
</html>
